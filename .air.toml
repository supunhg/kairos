root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o bin/kairos ./cmd/kairos"
bin = "bin/kairos"
full_bin = ""
include_ext = ["go", "proto"]
exclude_dir = ["api/v1", "bin", "tmp"]
exclude_regex = [".*_test.go$"]
stop_on_error = true

[log]
time = true

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"
